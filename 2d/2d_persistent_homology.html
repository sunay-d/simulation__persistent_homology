<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rastgele Noktalar + Dinamik Çember</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Rastgele Noktalar + Dinamik Çember</h1>
      <p>Çember yarıçapını kaydırıcıyla ayarla ve &quot;Yeniden Oluştur&quot; ile yeni konumlar üret.</p>
    </div>
    <div id="controls">
      <div class="control-row">
        <div style="width:100%; display: flex; flex-direction: row; justify-content: space-between; align-items: center;">
          <div style="display:flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; gap: .5rem;">
            <label class="label-group">
              <span style="width: 10px;">ε:</span>
              <input id="radiusRange" type="range" min="0" max="500" value="0" step="0.5">
              <span id="radiusValue"></span>
            </label>
            <label class="label-group">
              <span style="width: 10px;">n:</span>
              <input id="pointCount" type="range" min="0" max="100" value="0" step="1">
              <span id="pointCountValue"></span>
            </label>
          </div>

          <button id="regenBtn" class="btn">Yeniden Oluştur</button>
        </div>
        <div style="width:100%; display: flex; flex-direction: row; justify-content: space-between; align-items: center;">
          <div style="display:flex; flex-direction: row; justify-content: center; align-items: center;">
            <label class="label-group">Boyut:
              <select id="dimension" style="margin-left: 0.5rem;">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
              </select>
            </label>
          </div>
          <div style="display:flex; flex-direction: row; justify-content: center; align-items: center; gap: 0.5rem;">
            <span id="radiusInfo" class="status">Yarıçap:</span>
          </div>
        </div>
      </div>
    </div>
    <div style="display: flex; flex-direction: column; justify-content: center;">
      <div id="canvas-container">
        <canvas id="drawCanvas" width="920" height="500"></canvas>
      </div>
    <div style="display: flex; flex-direction: column; justify-content: center;">
        <div id="barcode-container">
          <canvas id="barcodeCanvas" width="920" height="300"></canvas>
        </div>
      </div>
      </div>
    </div>
  </div>

  <script src="functions.js"></script>
</body>
</html>
