<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rastgele Noktalar + 3B Dinamik Küre</title>
  <style>
    :root {
      --bg: #050620;
      --card: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.14);
      --text: #eae9f4;
      --muted: #aab2cc;
      --primary: #6e8bff;
      --accent: #ff6ecc;
      --shadow: 0 16px 28px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 40% 25%, #0a0f2d 0%, #02040e 40%, #000002 100%);
      background-image: radial-gradient(circle at 80% 10%, rgba(255, 255, 255, 0.16) 0%, transparent 2%),
                        radial-gradient(circle at 5% 70%, rgba(167, 206, 255, 0.11) 0%, transparent 15%),
                        radial-gradient(circle at 70% 60%, rgba(240, 236, 255, 0.08) 0%, transparent 20%),
                        linear-gradient(180deg, rgba(8, 10, 29, 1) 0%, rgba(1, 2, 10, 1) 100%);
      display: flex;
      justify-content: center;
      align-items: start;
      padding: 2rem;
    }
    .app {
      width: min(100%, 980px);
      backdrop-filter: blur(16px);
      background: linear-gradient(180deg, rgba(7, 17, 50, .85), rgba(4, 6, 21, .85));
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .header {
      padding: 1.2rem 1.4rem;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .header h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: .01em;
      color: #a8dbff;
      text-shadow: 0 0 14px rgba(175, 229, 255, 0.45);
    }
    .header p {
      margin: .38rem 0 0;
      color: #b2ccff;
      font-size: .92rem;
    }
    #controls {
      display: grid;
      gap: 0.85rem;
      padding: 1rem 1.4rem 1.2rem;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .label-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: .95rem;
      color: var(--text);
      flex: 1;
      min-width: 180px;
    }
    #radiusValue { font-weight: 700; color: #fff; width: 2rem; text-align: right; }
    .btn {
      border: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      font-weight: 700;
      padding: .55rem 1rem;
      box-shadow: 0 8px 20px rgba(98, 137, 255, .35);
      cursor: pointer;
      transition: transform .2s ease, filter .2s ease;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .btn:active { transform: translateY(1px); }
    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: .92rem;
    }
    #canvas-container {
      border-top: 1px solid rgba(255,255,255,.08);
      background: radial-gradient(circle at 30% 15%, rgba(105,115,214,.12), rgba(9,15,49,.75) 52%);
      min-height: 540px;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }
    #canvas-container::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 70% 20%, rgba(134,165,245,.16) 0%, transparent 44%),
                        radial-gradient(circle at 10% 70%, rgba(252,114,175,.14) 0%, transparent 40%);
      pointer-events: none;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      position: relative;
      z-index: 1;
    }

    input[type="range"] {
      appearance: none;
      -webkit-appearance: none;
      width: 220px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #63c8ff 0%, #7bdaff 100%);
      outline: none;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(165, 217, 255, .34);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #5a67ff;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #5a67ff;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Rastgele Noktalar + 3B Dinamik Küre</h1>
      <p>Yarıçapı ayarla, nokta küresel bağlantıları 3B ortamda incele.</p>
    </div>
    <div id="controls">
      <div class="control-row">
        <label class="label-group">
          <span>Yarıçap (n):</span>
          <input id="radiusRange" type="range" min="5" max="30" value="5" step="1">
          <span id="radiusValue">5</span> px
        </label>

        <label class="label-group">
          <span>Nokta Sayısı:</span>
          <input id="pointCount" type="number" min="5" max="100" value="50" style="width: 74px; padding: 0.25rem 0.45rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.25); background: rgba(8,10,28,0.8); color: #fff;">
        </label>

        <button id="regenBtn" class="btn">Yeniden Oluştur</button>
        <button id="randomSetBtn" class="btn" style="background: linear-gradient(135deg, #27d6a5, #5ec6ff);">Rastgele Set</button>
        <label class="label-group" style="gap: .3rem; margin-left: .26rem; min-width: 180px;">
          <input id="toggleCircles" type="checkbox" checked style="width: 16px; height: 16px;" />
          <span>Çember Göster</span>
        </label>
        <label class="label-group" style="gap: .3rem; margin-left: .16rem; min-width: 220px;">
          <input id="strictTriangle" type="checkbox" style="width: 16px; height: 16px;" />
          <span>Sadece daire kesişmesinde doldur</span>
        </label>
        <span id="info" class="status">Nokta sayısı: 50</span>
      </div>
    </div>
    <div id="canvas-container"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js';

    const container = document.getElementById("canvas-container");
    const radiusRange = document.getElementById("radiusRange");
    const radiusValue = document.getElementById("radiusValue");
    const regenBtn = document.getElementById("regenBtn");
    const randomSetBtn = document.getElementById("randomSetBtn");
    const toggleCircles = document.getElementById("toggleCircles");
    const strictTriangle = document.getElementById("strictTriangle");
    const pointCountInput = document.getElementById("pointCount");
    const info = document.getElementById("info");

    let pointCount = Number(pointCountInput.value);
    let points = [];
    let radius = Number(radiusRange.value);
    let showCircles = toggleCircles.checked;
    let strictTriangleMode = strictTriangle.checked;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050620);

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 4000);
    camera.position.set(0, 0, 900);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 120;
    controls.maxDistance = 2700;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.68);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.75);
    directionalLight.position.set(0.8, 1.1, 0.5);
    scene.add(directionalLight);

    const grid = new THREE.GridHelper(820, 24, 0x3c5f9c, 0x1f2b4d);
    grid.position.y = -180;
    scene.add(grid);

    const pointsGroup = new THREE.Group();
    const spheresGroup = new THREE.Group();
    const edgesGroup = new THREE.Group();
    const trianglesGroup = new THREE.Group();
    const tetrahedronsGroup = new THREE.Group();
    scene.add(pointsGroup, spheresGroup, edgesGroup, trianglesGroup, tetrahedronsGroup);

    function getDistance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z);
    }

    function circleTripleIntersection(a, b, c, r) {
      const dij = getDistance(a, b);
      const dik = getDistance(a, c);
      const djk = getDistance(b, c);
      if (dij > 2 * r || dik > 2 * r || djk > 2 * r) return false;

      const maxSide = Math.max(dij, dik, djk);
      const sumSq = dij * dij + dik * dik + djk * djk;
      if (maxSide * maxSide >= sumSq - maxSide * maxSide) {
        return maxSide / 2 <= r;
      }

      const s = (dij + dik + djk) / 2;
      const area = Math.sqrt(Math.max(0, s * (s - dij) * (s - dik) * (s - djk)));
      if (area <= 1e-9) return false;
      const circumradius = (dij * dik * djk) / (4 * area);
      return circumradius <= r;
    }

    function toSceneRadius(r) {
      return r * 2.8;
    }

    function clearGroup(group) {
      while (group.children.length) {
        group.remove(group.children[0]);
      }
    }

    function newPoints() {
      points = [];
      const range = 360;
      for (let i = 0; i < pointCount; i++) {
        points.push({
          x: (Math.random() - 0.5) * range,
          y: (Math.random() - 0.5) * range,
          z: (Math.random() - 0.5) * range * 0.34
        });
      }
      info.textContent = `Nokta sayısı: ${pointCount}`;
    }

    function updateScene() {
      clearGroup(pointsGroup);
      clearGroup(spheresGroup);
      clearGroup(edgesGroup);
      clearGroup(trianglesGroup);
      clearGroup(tetrahedronsGroup);

      const pointMaterial = new THREE.MeshStandardMaterial({ color: 0xffd27f, emissive: 0x4a3a86, roughness: 0.2, metalness: 0.3 });
      const pointGeometry = new THREE.SphereGeometry(4.2, 10, 8);

      points.forEach((p) => {
        const m = new THREE.Mesh(pointGeometry, pointMaterial);
        m.position.set(p.x, p.y, p.z);
        pointsGroup.add(m);
      });

      if (showCircles) {
        const sphereRadius = toSceneRadius(radius);
        const ringMaterial = new THREE.MeshBasicMaterial({ color: 0x8aa2ff, transparent: true, opacity: 0.14, wireframe: true });
        const ringGeometry = new THREE.SphereGeometry(sphereRadius, 26, 22);
        points.forEach((p) => {
          const sp = new THREE.Mesh(ringGeometry, ringMaterial);
          sp.position.set(p.x, p.y, p.z);
          spheresGroup.add(sp);
        });
      }

      const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x91ffff, transparent: true, opacity: 0.78 });
      const edgePositions = [];
      const edgeBound = 2 * toSceneRadius(radius) * 0.98;

      // Removed edge drawing as per user request

      if (edgePositions.length) {
        const edgesGeometry = new THREE.BufferGeometry();
        edgesGeometry.setAttribute("position", new THREE.Float32BufferAttribute(edgePositions, 3));
        edgesGroup.add(new THREE.LineSegments(edgesGeometry, edgeMaterial));
      }

      const tetraMaterial = new THREE.MeshStandardMaterial({
        color: 0x8ee8ff,
        emissive: 0x0f2f55,
        transparent: true,
        opacity: 0.14,
        side: THREE.DoubleSide,
        polygonOffset: true,
        polygonOffsetFactor: 1,
        polygonOffsetUnits: 1
      });

      const triMaterial = new THREE.MeshStandardMaterial({
        color: 0x8ee8ff,
        emissive: 0x0f2f55,
        transparent: true,
        opacity: 0.14,
        side: THREE.DoubleSide,
        polygonOffset: true,
        polygonOffsetFactor: 1,
        polygonOffsetUnits: 1
      });

      const tetraLineMaterial = new THREE.LineBasicMaterial({ color: 0x35b8e9, transparent: true, opacity: 0.24 });
      const strictThreshold = showCircles ? toSceneRadius(radius) : toSceneRadius(radius);

      // Triangles for three intersecting spheres
      for (let i = 0; i < points.length; i++) {
        for (let j = i + 1; j < points.length; j++) {
          for (let k = j + 1; k < points.length; k++) {
            const a = points[i];
            const b = points[j];
            const c = points[k];
            if (circleTripleIntersection(a, b, c, strictThreshold)) {
              const triGeo = new THREE.BufferGeometry();
              const triVerts = new Float32Array([a.x, a.y, a.z, b.x, b.y, b.z, c.x, c.y, c.z]);
              triGeo.setAttribute("position", new THREE.BufferAttribute(triVerts, 3));
              triGeo.setIndex([0, 1, 2]);
              triGeo.computeVertexNormals();
              trianglesGroup.add(new THREE.Mesh(triGeo, triMaterial));
            }
          }
        }
      }

      for (let i = 0; i < points.length; i++) {
        for (let j = i + 1; j < points.length; j++) {
          for (let k = j + 1; k < points.length; k++) {
            for (let l = k + 1; l < points.length; l++) {
              const a = points[i];
              const b = points[j];
              const c = points[k];
              const d = points[l];
              const dab = getDistance(a, b);
              const dac = getDistance(a, c);
              const dad = getDistance(a, d);
              const dbc = getDistance(b, c);
              const dbd = getDistance(b, d);
              const dcd = getDistance(c, d);
              if (dab <= edgeBound && dac <= edgeBound && dad <= edgeBound && dbc <= edgeBound && dbd <= edgeBound && dcd <= edgeBound) {
                const tetraGeo = new THREE.BufferGeometry();
                const tetraVerts = new Float32Array([a.x, a.y, a.z, b.x, b.y, b.z, c.x, c.y, c.z, d.x, d.y, d.z]);
                tetraGeo.setAttribute("position", new THREE.BufferAttribute(tetraVerts, 3));
                tetraGeo.setIndex([0,1,2, 0,1,3, 0,2,3, 1,2,3]);
                tetraGeo.computeVertexNormals();
                tetrahedronsGroup.add(new THREE.Mesh(tetraGeo, tetraMaterial));
                // Boundary lines for each face
                const face1Verts = new Float32Array([a.x, a.y, a.z, b.x, b.y, b.z, c.x, c.y, c.z]);
                const face2Verts = new Float32Array([a.x, a.y, a.z, b.x, b.y, b.z, d.x, d.y, d.z]);
                const face3Verts = new Float32Array([a.x, a.y, a.z, c.x, c.y, c.z, d.x, d.y, d.z]);
                const face4Verts = new Float32Array([b.x, b.y, b.z, c.x, c.y, c.z, d.x, d.y, d.z]);
                tetrahedronsGroup.add(new THREE.LineLoop(new THREE.BufferGeometry().setAttribute("position", new THREE.Float32BufferAttribute(face1Verts, 3)), tetraLineMaterial));
                tetrahedronsGroup.add(new THREE.LineLoop(new THREE.BufferGeometry().setAttribute("position", new THREE.Float32BufferAttribute(face2Verts, 3)), tetraLineMaterial));
                tetrahedronsGroup.add(new THREE.LineLoop(new THREE.BufferGeometry().setAttribute("position", new THREE.Float32BufferAttribute(face3Verts, 3)), tetraLineMaterial));
                tetrahedronsGroup.add(new THREE.LineLoop(new THREE.BufferGeometry().setAttribute("position", new THREE.Float32BufferAttribute(face4Verts, 3)), tetraLineMaterial));
              }
              }
            }
          }
        }
      }
    

    function resize() {
      const w = container.clientWidth;
      const top = container.getBoundingClientRect().top;
      const h = Math.max(260, window.innerHeight - top - 20);
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    window.addEventListener("resize", resize);

    radiusRange.addEventListener("input", () => {
      radius = Number(radiusRange.value);
      radiusValue.textContent = radius;
      updateScene();
    });

    pointCountInput.addEventListener("change", () => {
      let value = Number(pointCountInput.value);
      value = Math.max(5, Math.min(100, isNaN(value) ? 50 : value));
      pointCount = value;
      pointCountInput.value = pointCount;
      info.textContent = `Nokta sayısı: ${pointCount}`;
    });

    regenBtn.addEventListener("click", () => {
      pointCount = Number(pointCountInput.value);
      newPoints();
      updateScene();
    });

    randomSetBtn.addEventListener("click", () => {
      pointCount = Number(pointCountInput.value);
      newPoints();
      updateScene();
    });

    toggleCircles.addEventListener("change", () => {
      showCircles = toggleCircles.checked;
      updateScene();
    });

    strictTriangle.addEventListener("change", () => {
      strictTriangleMode = strictTriangle.checked;
      updateScene();
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    newPoints();
    resize();
    updateScene();
    animate();
  </script>
</body>
</html>
